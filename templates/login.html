<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OptiCrop · Sign In</title>
  <meta name="description" content="Sign in to OptiCrop — AI-powered crop intelligence." />
  <link rel="icon" href="{{ url_for('static', filename='images/crops/placeholder.svg') }}" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <style>
    /* Auth page layout — centred card */
    .auth-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-2);
      overflow: hidden;
    }

    .auth-header {
      background: var(--grad-brand);
      padding: 32px 32px 28px;
      text-align: center;
    }

    .auth-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .auth-brand__dot {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-brand__dot::after {
      content: "";
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
    }

    .auth-brand__name {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .auth-header__title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: rgba(255,255,255,0.90);
      margin: 0;
    }

    .auth-header__sub {
      font-size: 0.87rem;
      color: rgba(255,255,255,0.65);
      margin-top: 4px;
    }

    .auth-body {
      padding: 28px 32px 32px;
    }

    /* Alert / error */
    .auth-alert {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      background: color-mix(in oklab, var(--danger) 12%, transparent);
      border: 1px solid color-mix(in oklab, var(--danger) 35%, transparent);
      color: var(--text);
      font-size: 0.88rem;
      margin-bottom: 20px;
    }
    .auth-alert i { color: var(--danger); flex-shrink: 0; }

    /* Form */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      width: 16px;
      height: 16px;
    }

    .form-control {
      width: 100%;
      padding: 11px 14px 11px 38px;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.93rem;
      transition: border-color .2s, box-shadow .2s;
      box-sizing: border-box;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--brand-2);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand-2) 20%, transparent);
    }

    .form-control::placeholder { color: var(--text-muted); opacity: .6; }

    /* Submit button */
    .btn-primary {
      width: 100%;
      padding: 12px 20px;
      background: var(--grad-brand);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-display);
      font-size: 0.97rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 6px;
    }

    .btn-primary:hover  { opacity: .88; }
    .btn-primary:active { transform: scale(.98); }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--brand-2);
      font-weight: 600;
    }

    .auth-footer a:hover { text-decoration: underline; }

    /* Theme toggle (top-right corner) */
    .theme-float {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-1);
    }
    .theme-float:hover { background: var(--bg-elev); }
    .theme-float i { width: 16px; height: 16px; color: var(--text-muted); }
    [data-theme="dark"]  .ic-sun  { display: block; }
    [data-theme="dark"]  .ic-moon { display: none; }
    [data-theme="light"] .ic-sun  { display: none; }
    [data-theme="light"] .ic-moon { display: block; }
  </style>
</head>
<body>
  <button class="theme-float" id="themeBtn" aria-label="Toggle theme">
    <i data-lucide="sun" class="ic-sun"></i>
    <i data-lucide="moon" class="ic-moon"></i>
  </button>

  <div class="auth-shell">
    <div class="auth-card">

      <div class="auth-header">
        <div class="auth-brand">
          <div class="auth-brand__dot"></div>
          <span class="auth-brand__name">{{ brand }}</span>
        </div>
        <p class="auth-header__title">Welcome back</p>
        <p class="auth-header__sub">Sign in to your precision agriculture dashboard</p>
      </div>

      <div class="auth-body">

        {% if error %}
        <div class="auth-alert">
          <i data-lucide="alert-circle"></i>
          <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/login" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <div class="input-wrap">
              <i data-lucide="mail"></i>
              <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                placeholder="you@example.com"
                value="{{ email }}"
                required
                autocomplete="email"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <i data-lucide="lock"></i>
              <input
                type="password"
                id="password"
                name="password"
                class="form-control has-eye"
                placeholder="••••••••"
                required
                autocomplete="current-password"
              />
              <button type="button" class="eye-toggle" data-target="password" aria-label="Show password">
                <i data-lucide="eye"></i>
              </button>
            </div>
            <p class="hint" style="text-align:right; margin-top:8px;">
              <a href="/forgot-password" style="color: var(--brand-2); font-weight: 600;">Forgot password?</a>
            </p>
          </div>

          <button type="submit" class="btn-primary">
            Sign in
          </button>
        </form>

        <div class="auth-footer">
          Don't have an account?
          <a href="/register">Create one</a>
        </div>

      </div>
    </div>
  </div>

  <style>
    .input-wrap { position: relative; }
    .input-wrap .form-control.has-eye { padding-right: 42px; }
    .eye-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      color: var(--text-muted);
    }
    .eye-toggle:hover { color: var(--text); }
    .eye-toggle i { width: 16px; height: 16px; pointer-events: none; }
  </style>

  <script>
    // Password show/hide — eye icon: open = hidden text, closed (eye-off) = visible text.
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll(".eye-toggle").forEach((btn) => {
        btn.addEventListener("click", () => {
          const input = document.getElementById(btn.dataset.target);
          if (!input) return;
          const isHidden = input.type === "password";
          input.type = isHidden ? "text" : "password";
          btn.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
          btn.innerHTML = `<i data-lucide="${isHidden ? "eye-off" : "eye"}"></i>`;
          if (window.lucide) lucide.createIcons();
        });
      });
    });
  </script>

  <script>
    // Lucide icons
    document.addEventListener("DOMContentLoaded", () => {
      if (window.lucide) lucide.createIcons();
    });

    // Theme toggle
    const themeBtn = document.getElementById("themeBtn");
    const html     = document.documentElement;
    const saved    = localStorage.getItem("opticrop_theme") || "dark";
    html.setAttribute("data-theme", saved);

    themeBtn.addEventListener("click", () => {
      const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
      html.setAttribute("data-theme", next);
      localStorage.setItem("opticrop_theme", next);
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
